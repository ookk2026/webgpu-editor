<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebGPU Scene Player</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
    }
    #app {
      width: 100%;
      height: 100%;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
    }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      pointer-events: none;
    }
    #error {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ff4444;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      text-align: center;
      max-width: 80%;
    }
    #controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      padding: 10px 20px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 8px;
      backdrop-filter: blur(10px);
    }
    #controls button {
      padding: 8px 16px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }
    #controls button:hover {
      background: #2563eb;
    }
    #file-input {
      display: none;
    }
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="loading">初始化渲染器...</div>
    <div id="error" class="hidden"></div>
    <div id="controls">
      <button id="btn-load">加载场景</button>
      <button id="btn-reset">重置视角</button>
      <button id="btn-info">渲染信息</button>
    </div>
  </div>
  <input type="file" id="file-input" accept=".json" />
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
