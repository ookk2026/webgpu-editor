<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebGPU Editor Pro - 高级版</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: system-ui, sans-serif; background: #1a1a1a; }
    
    /* 布局 */
    #app { display: flex; flex-direction: column; width: 100%; height: 100%; }
    #toolbar { height: 44px; background: #252526; border-bottom: 1px solid #333; display: flex; align-items: center; padding: 0 12px; gap: 8px; }
    #main { flex: 1; display: flex; overflow: hidden; }
    #left { width: 240px; background: #252526; border-right: 1px solid #333; display: flex; flex-direction: column; }
    #center { flex: 1; position: relative; }
    #right { width: 300px; background: #252526; border-left: 1px solid #333; display: flex; flex-direction: column; overflow-y: auto; }
    #statusbar { height: 24px; background: #007acc; display: flex; align-items: center; padding: 0 12px; font-size: 11px; color: white; }
    
    /* 工具栏 */
    #toolbar button { padding: 6px 14px; background: #3c3c3c; color: #e0e0e0; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
    #toolbar button:hover { background: #4c4c4c; }
    #toolbar button.primary { background: #0e639c; }
    #toolbar button.primary:hover { background: #1177bb; }
    #toolbar button:disabled { opacity: 0.5; cursor: not-allowed; }
    #toolbar .separator { width: 1px; height: 20px; background: #444; margin: 0 4px; }
    
    /* 面板 */
    .panel-header { height: 32px; background: #2d2d2d; display: flex; align-items: center; padding: 0 12px; font-size: 11px; font-weight: 600; color: #bbb; border-bottom: 1px solid #333; }
    .panel-content { flex: 1; overflow: auto; padding: 8px; }
    
    /* 场景树 */
    .tree-item { padding: 6px 8px; cursor: pointer; border-radius: 3px; display: flex; align-items: center; gap: 8px; font-size: 12px; color: #ccc; }
    .tree-item:hover { background: #2a2d2e; }
    .tree-item.selected { background: #094771; }
    .tree-item .icon { font-size: 14px; }
    .tree-item .actions { margin-left: auto; display: none; gap: 4px; }
    .tree-item:hover .actions { display: flex; }
    .tree-item .actions button { background: transparent; border: none; color: #999; cursor: pointer; padding: 2px; font-size: 12px; }
    .tree-item .actions button:hover { color: #fff; }
    
    /* 视口 */
    #canvas { width: 100%; height: 100%; display: block; }
    #viewport-tools { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; padding: 4px; background: rgba(37,37,38,0.95); border-radius: 8px; backdrop-filter: blur(10px); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    #viewport-tools button { width: 36px; height: 36px; background: transparent; border: none; color: #e0e0e0; cursor: pointer; border-radius: 6px; font-size: 16px; transition: all 0.2s; }
    #viewport-tools button:hover, #viewport-tools button.active { background: #3c3c3c; }
    
    /* 属性面板 */
    .prop-group { border-bottom: 1px solid #333; }
    .prop-group-header { height: 28px; background: #2d2d2d; display: flex; align-items: center; padding: 0 12px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #bbb; cursor: pointer; user-select: none; }
    .prop-group-content { padding: 12px; }
    .prop-row { display: flex; align-items: center; margin-bottom: 10px; gap: 8px; }
    .prop-row:last-child { margin-bottom: 0; }
    .prop-label { width: 70px; color: #aaa; font-size: 11px; flex-shrink: 0; }
    .prop-input { flex: 1; display: flex; gap: 4px; }
    .prop-input input[type="number"], .prop-input input[type="text"] { flex: 1; padding: 5px 8px; background: #3c3c3c; border: 1px solid #444; border-radius: 3px; color: #e0e0e0; font-size: 11px; width: 0; }
    .prop-input input:focus { outline: none; border-color: #0e639c; }
    .prop-input input[type="color"] { width: 30px; height: 26px; padding: 2px; background: #3c3c3c; border: 1px solid #444; border-radius: 3px; cursor: pointer; }
    .prop-input input[type="range"] { flex: 1; }
    .prop-input select { flex: 1; padding: 5px 8px; background: #3c3c3c; border: 1px solid #444; border-radius: 3px; color: #e0e0e0; font-size: 11px; }
    .prop-value { min-width: 30px; text-align: right; font-size: 11px; color: #888; }
    
    /* 复选框 */
    .checkbox-row { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .checkbox-row input { width: 14px; height: 14px; }
    
    /* 按钮行 */
    .btn-row { display: flex; gap: 8px; margin-top: 12px; }
    .btn-row button { flex: 1; padding: 8px; background: #0e639c; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .btn-row button:hover { background: #1177bb; }
    .btn-row button.secondary { background: #3c3c3c; }
    .btn-row button.secondary:hover { background: #4c4c4c; }
    
    /* 状态栏 */
    #statusbar span { margin-right: 20px; }
    #statusbar .separator { margin: 0 8px; color: rgba(255,255,255,0.3); }
    
    /* 加载 */
    #loading { position: fixed; inset: 0; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; z-index: 1000; }
    #loading.hidden { display: none; }
    .spinner { width: 44px; height: 44px; border: 3px solid #333; border-top-color: #007acc; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* 空状态 */
    .empty-state { padding: 40px 20px; text-align: center; color: #666; font-size: 12px; }
    
    /* 文件输入 */
    #file-input { display: none; }
  </style>
</head>
<body>
  <div id="app">
    <!-- 工具栏 -->
    <div id="toolbar">
      <button onclick="editor.newScene()">新建</button>
      <button onclick="editor.loadScene()">打开</button>
      <button onclick="editor.saveScene()">保存</button>
      <div class="separator"></div>
      <button id="btn-undo" onclick="editor.undo()" disabled>↶ 撤销</button>
      <button id="btn-redo" onclick="editor.redo()" disabled>↷ 重做</button>
      <div class="separator"></div>
      <button onclick="editor.addCube()" class="primary">⧉ 立方体</button>
      <button onclick="editor.addSphere()" class="primary">○ 球体</button>
      <button onclick="editor.addCylinder()" class="primary">⬭ 圆柱</button>
      <button onclick="editor.addLight()" class="primary">💡 光源</button>
      <div style="flex:1"></div>
      <button onclick="editor.importGLTF()" title="导入 GLTF/GLB">📁 导入</button>
      <button onclick="editor.exportScene()">📦 导出</button>
    </div>

    <!-- 主区域 -->
    <div id="main">
      <!-- 左侧面板 -->
      <div id="left">
        <div class="panel-header">📂 场景层级</div>
        <div class="panel-content" id="scene-tree">
          <div class="empty-state">暂无对象</div>
        </div>
      </div>

      <!-- 中间视口 -->
      <div id="center">
        <canvas id="canvas"></canvas>
        <div id="viewport-tools">
          <button id="tool-translate" class="active" title="移动 (T)">↔</button>
          <button id="tool-rotate" title="旋转 (R)">↻</button>
          <button id="tool-scale" title="缩放 (S)">⤢</button>
          <button id="tool-local" title="切换坐标系">⊕</button>
        </div>
      </div>

      <!-- 右侧面板 -->
      <div id="right">
        <div class="panel-header">⚙️ 属性</div>
        
        <!-- 变换属性 -->
        <div class="prop-group">
          <div class="prop-group-header">🔄 变换</div>
          <div class="prop-group-content">
            <div class="prop-row">
              <span class="prop-label">位置</span>
              <div class="prop-input">
                <input id="pos-x" type="number" step="0.1" placeholder="X">
                <input id="pos-y" type="number" step="0.1" placeholder="Y">
                <input id="pos-z" type="number" step="0.1" placeholder="Z">
              </div>
            </div>
            <div class="prop-row">
              <span class="prop-label">旋转</span>
              <div class="prop-input">
                <input id="rot-x" type="number" step="1" placeholder="X">
                <input id="rot-y" type="number" step="1" placeholder="Y">
                <input id="rot-z" type="number" step="1" placeholder="Z">
              </div>
            </div>
            <div class="prop-row">
              <span class="prop-label">缩放</span>
              <div class="prop-input">
                <input id="scale-x" type="number" step="0.1" placeholder="X" value="1">
                <input id="scale-y" type="number" step="0.1" placeholder="Y" value="1">
                <input id="scale-z" type="number" step="0.1" placeholder="Z" value="1">
              </div>
            </div>
          </div>
        </div>

        <!-- 材质属性 -->
        <div class="prop-group">
          <div class="prop-group-header">🎨 材质</div>
          <div class="prop-group-content">
            <div class="prop-row">
              <span class="prop-label">类型</span>
              <div class="prop-input">
                <select id="mat-type">
                  <option value="MeshStandard">标准材质</option>
                  <option value="MeshPhysical">物理材质</option>
                  <option value="MeshBasic">基础材质</option>
                </select>
              </div>
            </div>
            <div class="prop-row">
              <span class="prop-label">颜色</span>
              <div class="prop-input">
                <input id="mat-color" type="color" value="#888888">
              </div>
            </div>
            <div class="prop-row">
              <span class="prop-label">自发光</span>
              <div class="prop-input">
                <input id="mat-emissive" type="color" value="#000000">
              </div>
            </div>
            <div class="prop-row">
              <span class="prop-label">粗糙度</span>
              <input id="mat-roughness" type="range" min="0" max="1" step="0.01" value="0.5">
              <span class="prop-value" id="val-roughness">0.5</span>
            </div>
            <div class="prop-row">
              <span class="prop-label">金属度</span>
              <input id="mat-metalness" type="range" min="0" max="1" step="0.01" value="0">
              <span class="prop-value" id="val-metalness">0</span>
            </div>
            <div class="prop-row">
              <span class="prop-label">清漆层</span>
              <input id="mat-clearcoat" type="range" min="0" max="1" step="0.01" value="0">
              <span class="prop-value" id="val-clearcoat">0</span>
            </div>
            <div class="prop-row">
              <span class="prop-label">不透明度</span>
              <input id="mat-opacity" type="range" min="0" max="1" step="0.01" value="1">
              <span class="prop-value" id="val-opacity">1</span>
            </div>
            <div class="prop-row">
              <label class="checkbox-row">
                <input id="mat-wireframe" type="checkbox">
                <span>线框模式</span>
              </label>
            </div>
            <div class="prop-row">
              <label class="checkbox-row">
                <input id="mat-transparent" type="checkbox">
                <span>透明</span>
              </label>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 状态栏 -->
    <div id="statusbar">
      <span id="st-mode">就绪</span>
      <span class="separator">|</span>
      <span id="st-obj">0 个对象</span>
      <span class="separator">|</span>
      <span id="st-render">WebGL2</span>
      <span class="separator">|</span>
      <span id="st-fps">-- FPS</span>
      <span class="separator">|</span>
      <span id="st-history">历史: 0/0</span>
    </div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <div>初始化编辑器...</div>
  </div>

  <input type="file" id="file-input" accept=".json,.gltf,.glb">

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { TransformControls } from 'three/addons/controls/TransformControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // ========== 命令系统 ==========
    class CommandManager {
      constructor(options = {}) {
        this.history = [];
        this.index = -1;
        this.maxSize = options.maxSize || 50;
        this.lastTime = 0;
        this.listeners = [];
      }

      execute(cmd) {
        // 删除当前位置之后的历史
        if (this.index < this.history.length - 1) {
          this.history = this.history.slice(0, this.index + 1);
        }

        // 执行命令
        cmd.execute();
        
        this.history.push(cmd);
        this.index++;

        // 限制历史大小
        if (this.history.length > this.maxSize) {
          this.history.shift();
          this.index--;
        }

        this.notify();
      }

      undo() {
        if (this.index < 0) return false;
        this.history[this.index].undo();
        this.index--;
        this.notify();
        return true;
      }

      redo() {
        if (this.index >= this.history.length - 1) return false;
        this.index++;
        this.history[this.index].execute();
        this.notify();
        return true;
      }

      canUndo() { return this.index >= 0; }
      canRedo() { return this.index < this.history.length - 1; }

      notify() {
        this.listeners.forEach(fn => fn({
          canUndo: this.canUndo(),
          canRedo: this.canRedo(),
          undoName: this.canUndo() ? this.history[this.index].name : null,
          redoName: this.canRedo() ? this.history[this.index + 1].name : null,
          index: this.index,
          total: this.history.length
        }));
      }

      onChange(fn) {
        this.listeners.push(fn);
      }

      clear() {
        this.history = [];
        this.index = -1;
        this.notify();
      }
    }

    // 基础命令类
    class Command {
      constructor(name) { this.name = name; }
      execute() {}
      undo() {}
    }

    // 添加对象命令
    class AddObjectCmd extends Command {
      constructor(editor, object) {
        super('添加 ' + object.name);
        this.editor = editor;
        this.object = object;
        this.parent = editor.scene;
      }
      execute() {
        this.parent.add(this.object);
        this.editor.objects.push(this.object);
        this.editor.updateTree();
        this.editor.updateStatus();
      }
      undo() {
        this.parent.remove(this.object);
        this.editor.objects = this.editor.objects.filter(o => o !== this.object);
        if (this.editor.selected === this.object) this.editor.select(null);
        this.editor.updateTree();
        this.editor.updateStatus();
      }
    }

    // 删除对象命令
    class RemoveObjectCmd extends Command {
      constructor(editor, object) {
        super('删除 ' + object.name);
        this.editor = editor;
        this.object = object;
        this.parent = object.parent;
        this.index = this.parent.children.indexOf(object);
      }
      execute() {
        this.parent.remove(this.object);
        this.editor.objects = this.editor.objects.filter(o => o !== this.object);
        if (this.editor.selected === this.object) this.editor.select(null);
        this.editor.updateTree();
        this.editor.updateStatus();
      }
      undo() {
        this.parent.children.splice(this.index, 0, this.object);
        this.object.parent = this.parent;
        this.editor.objects.push(this.object);
        this.editor.updateTree();
        this.editor.updateStatus();
      }
    }

    // 变换命令
    class TransformCmd extends Command {
      constructor(object, oldTransform) {
        super('变换');
        this.object = object;
        this.oldPos = oldTransform.position.clone();
        this.oldRot = oldTransform.rotation.clone();
        this.oldScale = oldTransform.scale.clone();
        this.newPos = object.position.clone();
        this.newRot = object.rotation.clone();
        this.newScale = object.scale.clone();
      }
      execute() {
        this.object.position.copy(this.newPos);
        this.object.rotation.copy(this.newRot);
        this.object.scale.copy(this.newScale);
      }
      undo() {
        this.object.position.copy(this.oldPos);
        this.object.rotation.copy(this.oldRot);
        this.object.scale.copy(this.oldScale);
      }
    }

    // 材质修改命令
    class MaterialCmd extends Command {
      constructor(material, oldValues, newValues) {
        super('修改材质');
        this.material = material;
        this.oldValues = { ...oldValues };
        this.newValues = { ...newValues };
      }
      execute() {
        Object.assign(this.material, this.newValues);
        this.material.needsUpdate = true;
      }
      undo() {
        Object.assign(this.material, this.oldValues);
        this.material.needsUpdate = true;
      }
    }

    // ========== 编辑器主类 ==========
    class Editor {
      constructor() {
        this.scene = null;
        this.camera = null;
        this.renderer = null;
        this.orbitCtrl = null;
        this.transformCtrl = null;
        this.raycaster = new THREE.Raycaster();
        this.mouse = new THREE.Vector2();
        this.objects = [];
        this.selected = null;
        this.isWebGPU = false;
        this.cmdMgr = new CommandManager({ maxSize: 50 });
        
        // 用于记录变换前的状态
        this.beforeTransform = null;
        
        this.init();
      }

      async init() {
        try {
          const canvas = document.getElementById('canvas');
          
          // 尝试 WebGPU
          if (navigator.gpu) {
            try {
              const adapter = await navigator.gpu.requestAdapter();
              if (adapter) {
                const { default: WebGPURenderer } = await import('three/addons/renderers/webgpu/WebGPURenderer.js');
                this.renderer = new WebGPURenderer({ canvas, antialias: true });
                await this.renderer.init();
                this.isWebGPU = true;
              }
            } catch(e) { console.log('WebGPU fallback:', e); }
          }
          
          if (!this.renderer) {
            this.renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
          }

          this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
          this.renderer.setSize(canvas.clientWidth, canvas.clientHeight);
          this.renderer.shadowMap.enabled = true;
          this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
          this.renderer.setClearColor(0x1a1a1a);

          // 场景
          this.scene = new THREE.Scene();
          this.scene.background = new THREE.Color(0x1a1a1a);

          // 相机
          this.camera = new THREE.PerspectiveCamera(60, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
          this.camera.position.set(5, 5, 5);
          this.camera.lookAt(0, 0, 0);

          // 控制
          this.orbitCtrl = new OrbitControls(this.camera, canvas);
          this.orbitCtrl.enableDamping = true;

          this.transformCtrl = new TransformControls(this.camera, canvas);
          this.transformCtrl.addEventListener('dragging-changed', (e) => {
            this.orbitCtrl.enabled = !e.value;
          });
          this.transformCtrl.addEventListener('mouseDown', () => {
            // 记录变换前的状态
            if (this.selected) {
              this.beforeTransform = {
                position: this.selected.position.clone(),
                rotation: this.selected.rotation.clone(),
                scale: this.selected.scale.clone()
              };
            }
          });
          this.transformCtrl.addEventListener('mouseUp', () => {
            // 创建变换命令
            if (this.selected && this.beforeTransform) {
              const cmd = new TransformCmd(this.selected, this.beforeTransform);
              this.cmdMgr.execute(cmd);
              this.beforeTransform = null;
            }
          });
          this.transformCtrl.addEventListener('change', () => this.updateInputs());
          this.scene.add(this.transformCtrl);

          // 默认光源
          const ambient = new THREE.AmbientLight(0x404040, 0.5);
          ambient.name = '环境光';
          this.scene.add(ambient);

          const dir = new THREE.DirectionalLight(0xffffff, 1);
          dir.name = '主光源';
          dir.position.set(5, 10, 7);
          dir.castShadow = true;
          this.scene.add(dir);

          // 网格
          const grid = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
          grid.name = '网格';
          this.scene.add(grid);

          // 默认立方体
          this.addCube();

          // 事件
          window.addEventListener('resize', () => this.onResize());
          canvas.addEventListener('pointerdown', (e) => this.onPointerDown(e));
          window.addEventListener('keydown', (e) => this.onKeyDown(e));

          // 属性输入监听
          this.setupPropertyListeners();

          // 命令管理器监听
          this.cmdMgr.onChange((state) => {
            document.getElementById('btn-undo').disabled = !state.canUndo;
            document.getElementById('btn-redo').disabled = !state.canRedo;
            document.getElementById('st-history').textContent = 
              `历史: ${state.index + 1}/${state.total}`;
          });

          // 渲染循环
          this.animate();

          // UI 更新
          document.getElementById('loading').classList.add('hidden');
          document.getElementById('st-render').textContent = this.isWebGPU ? 'WebGPU' : 'WebGL2';

          // 绑定工具栏
          document.getElementById('tool-translate').onclick = () => this.setTool('translate');
          document.getElementById('tool-rotate').onclick = () => this.setTool('rotate');
          document.getElementById('tool-scale').onclick = () => this.setTool('scale');
          document.getElementById('tool-local').onclick = () => this.toggleSpace();

          console.log('编辑器初始化完成');

        } catch (err) {
          console.error('初始化失败:', err);
          document.querySelector('#loading div:last-child').textContent = '初始化失败: ' + err.message;
        }
      }

      animate() {
        requestAnimationFrame(() => this.animate());
        this.orbitCtrl.update();
        this.renderer.render(this.scene, this.camera);
      }

      onResize() {
        const canvas = document.getElementById('canvas');
        const parent = canvas.parentElement;
        this.camera.aspect = parent.clientWidth / parent.clientHeight;
        this.camera.updateProjectionMatrix();
        this.renderer.setSize(parent.clientWidth, parent.clientHeight);
      }

      onPointerDown(e) {
        if (e.button !== 0) return;
        
        const canvas = document.getElementById('canvas');
        const rect = canvas.getBoundingClientRect();
        this.mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        this.mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

        this.raycaster.setFromCamera(this.mouse, this.camera);
        const meshes = this.objects.filter(o => o.isMesh);
        const intersects = this.raycaster.intersectObjects(meshes);

        if (intersects.length > 0 && !this.transformCtrl.dragging) {
          this.select(intersects[0].object);
        } else if (!this.transformCtrl.dragging) {
          this.select(null);
        }
      }

      onKeyDown(e) {
        if (e.target.tagName === 'INPUT') return;
        
        switch(e.key.toLowerCase()) {
          case 't': this.setTool('translate'); break;
          case 'r': this.setTool('rotate'); break;
          case 's': this.setTool('scale'); break;
          case 'delete':
          case 'backspace': this.deleteSelected(); break;
          case 'z': 
            if (e.ctrlKey || e.metaKey) {
              e.shiftKey ? this.redo() : this.undo();
            }
            break;
          case 'd': 
            if (e.ctrlKey || e.metaKey) {
              e.preventDefault();
              this.duplicate();
            }
            break;
          case 'y':
            if (e.ctrlKey || e.metaKey) this.redo();
            break;
        }
      }

      // 对象操作
      addCube() {
        const geo = new THREE.BoxGeometry(1, 1, 1);
        const mat = new THREE.MeshStandardMaterial({ 
          color: new THREE.Color().setHSL(Math.random(), 0.7, 0.5),
          roughness: 0.5, metalness: 0.1
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.name = '立方体 ' + (this.objects.filter(o => o.name?.includes('立方')).length + 1);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        mesh.position.set((Math.random()-0.5)*4, 0.5, (Math.random()-0.5)*4);
        
        this.cmdMgr.execute(new AddObjectCmd(this, mesh));
        this.select(mesh);
      }

      addSphere() {
        const geo = new THREE.SphereGeometry(0.5, 32, 16);
        const mat = new THREE.MeshStandardMaterial({ 
          color: new THREE.Color().setHSL(Math.random(), 0.7, 0.5),
          roughness: 0.3, metalness: 0.2
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.name = '球体 ' + (this.objects.filter(o => o.name?.includes('球')).length + 1);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        mesh.position.set((Math.random()-0.5)*4, 0.5, (Math.random()-0.5)*4);
        
        this.cmdMgr.execute(new AddObjectCmd(this, mesh));
        this.select(mesh);
      }

      addCylinder() {
        const geo = new THREE.CylinderGeometry(0.5, 0.5, 1, 32);
        const mat = new THREE.MeshStandardMaterial({ 
          color: new THREE.Color().setHSL(Math.random(), 0.7, 0.5),
          roughness: 0.4, metalness: 0.1
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.name = '圆柱 ' + (this.objects.filter(o => o.name?.includes('圆柱')).length + 1);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        mesh.position.set((Math.random()-0.5)*4, 0.5, (Math.random()-0.5)*4);
        
        this.cmdMgr.execute(new AddObjectCmd(this, mesh));
        this.select(mesh);
      }

      addLight() {
        const light = new THREE.PointLight(0xffaa00, 1, 10);
        light.name = '点光源 ' + (this.objects.filter(o => o.name?.includes('光源')).length + 1);
        light.position.set(2, 3, 2);
        
        const helper = new THREE.Mesh(
          new THREE.SphereGeometry(0.1),
          new THREE.MeshBasicMaterial({ color: 0xffaa00 })
        );
        helper.name = '可视化';
        light.add(helper);
        
        this.cmdMgr.execute(new AddObjectCmd(this, light));
        this.select(light);
      }

      deleteSelected() {
        if (this.selected) {
          this.cmdMgr.execute(new RemoveObjectCmd(this, this.selected));
        }
      }

      duplicate() {
        if (!this.selected || !this.selected.isMesh) return;
        
        const clone = this.selected.clone();
        clone.name = this.selected.name + ' 副本';
        clone.position.x += 1;
        clone.material = this.selected.material.clone();
        
        this.cmdMgr.execute(new AddObjectCmd(this, clone));
        this.select(clone);
      }

      // 选择
      select(obj) {
        this.selected = obj;
        if (obj) {
          this.transformCtrl.attach(obj);
          this.transformCtrl.visible = true;
        } else {
          this.transformCtrl.detach();
          this.transformCtrl.visible = false;
        }
        this.updateInputs();
        this.updateTree();
        this.updateMaterialPanel();
      }

      // 工具
      setTool(mode) {
        this.transformCtrl.setMode(mode);
        document.querySelectorAll('#viewport-tools button').forEach(b => b.classList.remove('active'));
        document.getElementById('tool-' + mode).classList.add('active');
      }

      toggleSpace() {
        const current = this.transformCtrl.space;
        const next = current === 'local' ? 'world' : 'local';
        this.transformCtrl.setSpace(next);
        document.getElementById('tool-local').textContent = next === 'local' ? '⊕' : '⊙';
      }

      // 撤销/重做
      undo() { this.cmdMgr.undo(); this.updateInputs(); }
      redo() { this.cmdMgr.redo(); this.updateInputs(); }

      // 场景操作
      newScene() {
        if (!confirm('确定要新建场景？未保存的更改将丢失。')) return;
        
        // 清除所有对象
        [...this.objects].forEach(obj => {
          this.scene.remove(obj);
        });
        this.objects = [];
        this.select(null);
        this.cmdMgr.clear();
        
        // 添加默认对象
        this.addCube();
      }

      saveScene() {
        const data = {
          version: '1.0.0',
          metadata: { name: 'My Scene', created: Date.now() },
          objects: this.objects.filter(o => o.isMesh).map(o => ({
            name: o.name,
            type: o.geometry.type,
            position: o.position.toArray(),
            rotation: o.rotation.toArray(),
            scale: o.scale.toArray(),
            material: {
              color: o.material.color.getHex(),
              roughness: o.material.roughness,
              metalness: o.material.metalness
            }
          }))
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'scene.json';
        a.click();
        URL.revokeObjectURL(url);
      }

      loadScene() {
        document.getElementById('file-input').accept = '.json';
        document.getElementById('file-input').onchange = (e) => {
          const file = e.target.files[0];
          if (!file) return;
          
          const reader = new FileReader();
          reader.onload = (e) => {
            try {
              const data = JSON.parse(e.target.result);
              console.log('加载场景:', data.metadata?.name || '未命名');
              // TODO: 反序列化场景
              alert('场景加载功能待完善');
            } catch (err) {
              alert('文件解析失败');
            }
          };
          reader.readAsText(file);
        };
        document.getElementById('file-input').click();
      }

      importGLTF() {
        document.getElementById('file-input').accept = '.gltf,.glb';
        document.getElementById('file-input').onchange = (e) => {
          const file = e.target.files[0];
          if (!file) return;
          
          const loader = new GLTFLoader();
          const url = URL.createObjectURL(file);
          
          loader.load(url, (gltf) => {
            const model = gltf.scene;
            model.name = file.name.replace(/\.[^.]+$/, '');
            
            // 计算包围盒并居中
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center);
            model.position.y += box.max.y - box.min.y;
            
            this.cmdMgr.execute(new AddObjectCmd(this, model));
            this.select(model);
            URL.revokeObjectURL(url);
          }, undefined, (err) => {
            alert('加载失败: ' + err.message);
            URL.revokeObjectURL(url);
          });
        };
        document.getElementById('file-input').click();
      }

      exportScene() {
        this.saveScene();
      }

      // UI 更新
      updateTree() {
        const tree = document.getElementById('scene-tree');
        if (this.objects.length === 0) {
          tree.innerHTML = '<div class="empty-state">暂无对象</div>';
          return;
        }

        let html = '';
        const icons = { Mesh: '🎲', PointLight: '💡', Group: '📁' };
        
        this.objects.forEach((obj, i) => {
          const selected = obj === this.selected ? 'selected' : '';
          const icon = icons[obj.type] || '📄';
          html += `
            <div class="tree-item ${selected}" onclick="editor.selectByIndex(${i})">
              <span class="icon">${icon}</span>
              <span>${obj.name}</span>
              <span class="actions">
                <button onclick="event.stopPropagation(); editor.toggleVisibility(${i})">👁</button>
                <button onclick="event.stopPropagation(); editor.deleteByIndex(${i})">🗑</button>
              </span>
            </div>
          `;
        });
        tree.innerHTML = html;
      }

      selectByIndex(i) { this.select(this.objects[i]); }
      
      deleteByIndex(i) {
        this.cmdMgr.execute(new RemoveObjectCmd(this, this.objects[i]));
      }

      toggleVisibility(i) {
        const obj = this.objects[i];
        obj.visible = !obj.visible;
        this.updateTree();
      }

      updateStatus() {
        const count = this.objects.filter(o => o.isMesh).length;
        document.getElementById('st-obj').textContent = count + ' 个对象';
      }

      updateInputs() {
        if (!this.selected) {
          ['pos-x','pos-y','pos-z','rot-x','rot-y','rot-z','scale-x','scale-y','scale-z']
            .forEach(id => document.getElementById(id).value = id.startsWith('scale') ? 1 : 0);
          return;
        }

        const set = (id, v) => document.getElementById(id).value = v.toFixed(2);
        set('pos-x', this.selected.position.x);
        set('pos-y', this.selected.position.y);
        set('pos-z', this.selected.position.z);
        set('rot-x', THREE.MathUtils.radToDeg(this.selected.rotation.x));
        set('rot-y', THREE.MathUtils.radToDeg(this.selected.rotation.y));
        set('rot-z', THREE.MathUtils.radToDeg(this.selected.rotation.z));
        set('scale-x', this.selected.scale.x);
        set('scale-y', this.selected.scale.y);
        set('scale-z', this.selected.scale.z);
      }

      setupPropertyListeners() {
        // 变换属性
        const transformIds = ['pos-x','pos-y','pos-z','rot-x','rot-y','rot-z','scale-x','scale-y','scale-z'];
        transformIds.forEach(id => {
          document.getElementById(id).addEventListener('change', () => this.applyTransform());
        });

        // 材质属性
        document.getElementById('mat-color').addEventListener('input', (e) => this.applyMaterial('color', e.target.value));
        document.getElementById('mat-emissive').addEventListener('input', (e) => this.applyMaterial('emissive', e.target.value));
        document.getElementById('mat-roughness').addEventListener('input', (e) => {
          document.getElementById('val-roughness').textContent = e.target.value;
          this.applyMaterial('roughness', parseFloat(e.target.value));
        });
        document.getElementById('mat-metalness').addEventListener('input', (e) => {
          document.getElementById('val-metalness').textContent = e.target.value;
          this.applyMaterial('metalness', parseFloat(e.target.value));
        });
        document.getElementById('mat-clearcoat').addEventListener('input', (e) => {
          document.getElementById('val-clearcoat').textContent = e.target.value;
          this.applyMaterial('clearcoat', parseFloat(e.target.value));
        });
        document.getElementById('mat-opacity').addEventListener('input', (e) => {
          document.getElementById('val-opacity').textContent = e.target.value;
          this.applyMaterial('opacity', parseFloat(e.target.value));
        });
        document.getElementById('mat-wireframe').addEventListener('change', (e) => this.applyMaterial('wireframe', e.target.checked));
        document.getElementById('mat-transparent').addEventListener('change', (e) => this.applyMaterial('transparent', e.target.checked));
      }

      applyTransform() {
        if (!this.selected) return;
        
        const get = (id) => parseFloat(document.getElementById(id).value) || 0;
        this.selected.position.set(get('pos-x'), get('pos-y'), get('pos-z'));
        this.selected.rotation.set(
          THREE.MathUtils.degToRad(get('rot-x')),
          THREE.MathUtils.degToRad(get('rot-y')),
          THREE.MathUtils.degToRad(get('rot-z'))
        );
        this.selected.scale.set(get('scale-x'), get('scale-y'), get('scale-z'));
      }

      applyMaterial(prop, value) {
        if (!this.selected || !this.selected.material) return;
        
        const mat = this.selected.material;
        const oldValues = {};
        const newValues = {};

        if (prop === 'color' || prop === 'emissive') {
          oldValues[prop] = mat[prop].getHex();
          newValues[prop] = new THREE.Color(value).getHex();
          mat[prop].set(value);
        } else {
          oldValues[prop] = mat[prop];
          newValues[prop] = value;
          mat[prop] = value;
        }
        
        mat.needsUpdate = true;
        
        // 创建材质命令
        this.cmdMgr.execute(new MaterialCmd(mat, oldValues, newValues));
      }

      updateMaterialPanel() {
        const hasMat = this.selected && this.selected.material;
        const panel = document.querySelector('.prop-group:nth-child(2)');
        if (!panel) return;
        
        if (!hasMat) {
          panel.style.opacity = '0.5';
          panel.style.pointerEvents = 'none';
          return;
        }
        
        panel.style.opacity = '1';
        panel.style.pointerEvents = 'auto';
        
        const mat = this.selected.material;
        
        // 更新控件值
        const setColor = (id, color) => {
          const hex = '#' + color.getHexString();
          document.getElementById(id).value = hex;
        };
        
        setColor('mat-color', mat.color);
        if (mat.emissive) setColor('mat-emissive', mat.emissive);
        
        const setRange = (id, val) => {
          document.getElementById(id).value = val;
          document.getElementById('val-' + id.split('-')[1]).textContent = val;
        };
        
        if ('roughness' in mat) setRange('mat-roughness', mat.roughness);
        if ('metalness' in mat) setRange('mat-metalness', mat.metalness);
        if ('clearcoat' in mat) setRange('mat-clearcoat', mat.clearcoat);
        if ('opacity' in mat) setRange('mat-opacity', mat.opacity);
        
        if ('wireframe' in mat) document.getElementById('mat-wireframe').checked = mat.wireframe;
        if ('transparent' in mat) document.getElementById('mat-transparent').checked = mat.transparent;
      }
    }

    // 启动编辑器
    window.editor = new Editor();
    
    // FPS 计数
    let frames = 0, last = performance.now();
    setInterval(() => {
      const now = performance.now();
      const fps = Math.round(frames * 1000 / (now - last));
      document.getElementById('st-fps').textContent = fps + ' FPS';
      frames = 0;
      last = now;
    }, 1000);
    
    const origAnimate = window.editor.animate;
    window.editor.animate = function() {
      frames++;
      origAnimate.call(this);
    };
  </script>
</body>
</html>
